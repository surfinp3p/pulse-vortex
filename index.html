<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    创造性说明
    创造性主要在于主题：不是具体功能实现，而是视觉想法传达。
    
    由于代码量较大，涉及参数极多，许多具体实现交给了 AI 辅助完成。具体来说，生成对应效果的逻辑和模块设计，还有初始的参数配置，代码都是由 AI 生成的。但是初始一版的代码最终的呈现效果肯定不尽如人意，所以在 AI 生成完代码之后，我会通过交互了解对应功能对应的板块中各参数的作用，然后才是反复修改参数从而优化最终的网页视觉呈现效果。
    
    设计灵感来源于漩涡这一本身就具有一定视觉冲击力的自然现象以及对“爆炸”这一视觉元素的兴趣（通过释放冲击波的形式呈现），希望通过简洁的交互和视觉效果，带给浏览者一种沉浸式的体验。

    网页设计早期的想法包含了梦核场景、建筑、池塘众多元素，页面复杂，但在实际实现过程中发现主题发散且实现难度过大，因此逐步删减为单一漩涡主体。（领悟到“减法”也是一种设计的智慧）

    开发过程中遇到的困难和对应的 debug 过程（摘取了几个主要问题）：
    
    1. 鼠标移动引导漩涡的实现：最初尝试使用简单的线性插值来更新漩涡中心位置，但发现效果不够平滑，后来改为使用缓动函数，使得漩涡移动更加自然。
  -->
  <title>💥爆炸漩涡</title>
  <link rel="stylesheet" href="vortex.css">
</head>

<body>
  <main class="vortex-page">
    <canvas id="vortexCanvas" aria-label="简洁漩涡视觉效果"></canvas>

    <section class="intro-overlay is-intro" id="introOverlay" aria-label="启动引导">
      <div class="intro-content">
        <div class="intro-main">
          <p class="intro-kicker">💥爆炸漩涡</p>
          <p class="intro-awaken">按空格唤醒</p>
        </div>

        <div class="hud-panel" aria-label="运行提示">
          <p><span>空格键</span><span>→ 启动 / 手动休眠漩涡</span></p>
          <p><span>移动鼠标</span><span>→ 引导漩涡</span></p>
          <p><span>长按左键</span><span>→ 正向旋转蓄能</span></p>
          <p><span>右键 / Shift+左键</span><span>→ 反向旋转蓄能</span></p>
          <p><span>松开鼠标</span><span>→ 释放冲击波</span></p>
          <p><span>数秒无操作</span><span>→ 自动休眠</span></p>
          <p class="instruction-tip"><span>提示</span><span>使用右键时尽量保持鼠标静止，防止浏览器手势误操作</span></p>
        </div>
      </div>
    </section>

    <footer class="vortex-credit is-visible" id="vortexCredit">
      想法参考：<a href="https://fff.cmiscm.com/#!/section/spiral" target="_blank" rel="noopener noreferrer">FFF Spiral
        Section</a><br>
      网页具体内容与交互方式的构思为原创，没有参考其他机制<br>
      作品的主要想法在于 视觉冲击主题 的表达<s>(虽然很简陋)</s>，而不是对特定游戏玩法的实现<br>
      感谢 ChatGPT 在交互讨论中提供的帮助与启发<br>
      感谢 Codex 在代码实现方面提供的辅助支持<br>
    </footer>
  </main>

  <script src="vortex.js"></script>
</body>

</html>
